stages:
  - deploy

pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r index.html css/ js/ 404.html icon.svg icon.png favicon.ico robots.txt site.webmanifest public/
    - cp -r assets public/assets
    - cp -r assets public/assets
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"


